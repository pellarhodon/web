name: Update R6 Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update
        run: python update_stats.py

      - name: Commit and push
        run: |
          git config --global user.name "PellarBot"
          git config --global user.email "bot@pellarhodon.com"
          git add index.html
          git commit -m "SYSTEM: DATA_SYNC_UPDATE" || exit 0
          git push
