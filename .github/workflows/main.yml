name: Update R6 Stats

on:
  schedule:
    - cron: '0 * * * *' # Spustí se automaticky každou hodinu
  workflow_dispatch: # Umožní ti spustit bota ručně tlačítkem

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Důležité: dává botovi právo zapisovat do tvého index.html
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python update_stats.py

      - name: Commit and push changes
        run: |
          git config --global user.name "PellarBot"
          git config --global user.email "bot@pellarhodon.com"
          git add index.html
          git commit -m "SYSTEM: R6_DATABASE_SYNC_COMPLETE" || exit 0
          git push
