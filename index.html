<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #ff0000;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }

        .header { margin-top: 15vh; text-align: center; }
        h1 {
            font-size: clamp(40px, 10vw, 80px); letter-spacing: 0.3em;
            text-transform: uppercase; margin: 0; color: #440000;
            animation: pulse 5s infinite;
        }
        @keyframes pulse { 50% { color: #ff0000; text-shadow: 0 0 20px #ff0000; } }

        .container {
            position: absolute; bottom: 40px; width: 90%;
            display: flex; flex-direction: column; gap: 10px;
            border-top: 1px solid #330000; padding-top: 20px;
        }

        .log-line {
            font-size: 12px; line-height: 1.6; text-transform: uppercase;
            display: flex; flex-wrap: wrap; gap: 10px;
        }

        .label { color: #660000; }
        .value { color: #ff0000; font-weight: bold; }
        .separator { color: #330000; }

        #spotify-status { border: 1px solid #220000; padding: 5px 10px; background: #050505; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pellarhodon</h1>
    </div>

    <div class="container">
        <div class="log-line">
            <span class="label">[R6_OPERATOR]</span>
            <span class="value">LVL_373</span>
            <span class="separator">//</span>
            <span class="label">RANK</span>
            <span class="value">GOLD_II</span>
            <span class="separator">//</span>
            <span class="label">REGION</span>
            <span class="value">EU_CENTRAL</span>
        </div>

        <div class="log-line" id="spotify-status">
            <span class="label">[STREAMING]</span>
            <span id="track-info" class="value">SYNCING_WITH_STATS.FM...</span>
        </div>

        <div class="log-line">
            <span class="label">[SYSTEM]</span>
            <span>STEAM_VAL: <span class="value">1927€</span></span>
            <span class="separator">//</span>
            <span>UPTIME: <span id="uptime" class="value">0D_0H_0M_0S</span></span>
            <span class="separator">//</span>
            <span class="label">STATUS</span>
            <span class="value">ONLINE</span>
        </div>
    </div>

    <script>
        // --- ŽIVÁ DATA ZE SPOTIFY (Přes Stats.fm API) ---
        async function updateSpotify() {
            try {
                // Používáme tvoje ID, které jsi poslal
                const res = await fetch('https://api.stats.fm/api/v1/users/31t4msdnvfenngbqcadme5oygj3q/currently-playing');
                const data = await res.json();
                
                const trackElement = document.getElementById('track-info');
                if (data && data.item) {
                    trackElement.innerText = `${data.item.track.name.toUpperCase()} — ${data.item.track.artists[0].name.toUpperCase()}`;
                } else {
                    trackElement.innerText = "NOTHING_PLAYING";
                }
            } catch (e) {
                document.getElementById('track-info').innerText = "STATS.FM_CONNECTED";
            }
        }

        // --- UPTIME ---
        const start = new Date(2025, 0, 1, 12, 0, 0).getTime();
        function updateUptime() {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').innerText = `${d}D_${h}H_${m}M_${s}S`;
        }

        setInterval(updateSpotify, 10000); // Každých 10s kontrola Spotify
        setInterval(updateUptime, 1000);
        updateSpotify();
        updateUptime();
    </script>
</body>
</html>
