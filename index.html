            color: #2a0000; font-size: clamp(32px, 10vw, 90px); 
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.3em; margin: 0;
            animation: pulse 10s ease-in-out infinite;

            text-transform: uppercase; font-weight: bold;

            50% { color: #440000; }
        }

        .bottom-panel {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); display: flex;
            flex-direction: column; align-items: center; gap: 20px;
        }

        .stat-item { opacity: 0.3; filter: grayscale(100%); transition: 0.5s; }
        .stat-item:hover { opacity: 1; filter: grayscale(0%); }
        .r6-widget { width: 420px; height: 80px; border-radius: 8px; overflow: hidden; }
        @media (max-width: 768px) { .r6-widget { width: 90vw; } }
    </style>

    <script>
        // Start date: 1. Ledna 2026 (měsíc 0)
        const start = new Date(2026, 0, 1, 12, 0, 0);

        function tick() {
            const now = new Date();
            const d = Math.floor(Math.abs(now - start) / 86400000);
            const h = Math.floor((Math.abs(now - start) / 3600000) % 24);
            const m = Math.floor((Math.abs(now - start) / 60000) % 60);
            const s = Math.floor((Math.abs(now - start) / 1000) % 60);
            
            const log = document.getElementById('uptime-log');
            if(log) {
                log.innerText = `UPTIME: ${d}D_${h}H_${m}M_${s}S // STATUS: OPERATIONAL`;
            }
        }
        setInterval(tick, 1000);
        tick();
    </script>
