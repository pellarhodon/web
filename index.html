<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Pellarhodon</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000;
            display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; font-family: 'Inter', sans-serif;
        }

        /* JMÉNO NAHOŘE */
        .header { margin-top: 15vh; text-align: center; }
        
        h1 {
            color: #2a0000; font-size: clamp(32px, 10vw, 90px); 
            font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.3em; margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.02);
        }

        /* SPODNÍ PANEL */
        .footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Mezera mezi widgety */
        }

        /* Widgety v klidu utlumené */
        .stat-item {
            opacity: 0.25;
            filter: grayscale(100%) brightness(80%);
            transition: all 0.7s ease;
        }

        .stat-item:hover {
            opacity: 1;
            filter: grayscale(0%) brightness(100%);
        }

        iframe { border-radius: 8px; border: 1px solid #1a0000; }

     /* UPTIME ŘÁDEK - Viditelnější varianta */
#uptime-log { 
    color: #aa0000; /* Jasnější rudá, která už nezmizí */
    font-family: monospace; 
    font-size: 11px; 
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 15px;
    opacity: 0.8; /* Zvýšená viditelnost */
    /* Jemná záře, aby text "vystoupil" z pozadí */
    text-shadow: 0 0 5px rgba(255, 0, 0, 0.2); 
}
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pellarhodon</h1>
    </div>

    <div class="footer">
        <div class="stat-item">
            <iframe src="https://r6data.eu/streaming-widget?data=..." width="420" height="80" frameborder="0" scrolling="no"></iframe>
        </div>

        <div class="stat-item steam-data">
            <a href="https://steamdb.info/calculator/76561198009042620/?cc=eu" target="_blank" style="text-decoration: none;">
                <div style="color: #660000; font-family: monospace; font-size: 11px; letter-spacing: 1px; border: 1px solid #1a0000; padding: 8px 15px; border-radius: 4px; background: rgba(10, 0, 0, 0.5);">
                    STEAM_VAL: <span style="color: #990000;">1927€</span> // 
                    GAMES: <span style="color: #990000;">269</span> // 
                    PLAYTIME: <span style="color: #990000;">7,240H</span>
                </div>
            </a>
        </div>

        <div class="stat-item">
            <a href="https://wigle.net">
                <img src="https://wigle.net/bi/GlBn9ccbiSGDMDb1tTQ_jg.png" width="180">
            </a>
        </div>

        <div id="uptime-log">SYSTEM_SYNC...</div>
    </div>

    <script>
        const start = new Date(2026, 0, 1).getTime(); // Uprav si datum podle sebe
        function update() {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime-log').innerHTML = `UPTIME: ${d}D_${h}H_${m}M_${s}S // STATUS: ONLINE`;
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
