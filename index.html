<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon // OS</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #cc0000;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        .header { margin-top: 15vh; text-align: center; }
        h1 {
            font-size: clamp(30px, 8vw, 70px); letter-spacing: 0.4em;
            text-transform: uppercase; margin: 0; color: #330000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
        }

        .terminal {
            position: absolute; bottom: 40px; width: 90%; max-width: 800px;
            border-top: 1px solid #220000; padding-top: 20px;
        }

        .line { font-size: 11px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .label { color: #550000; margin-right: 10px; }
        .value { color: #ff0000; font-weight: bold; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        #spotify-box { border-left: 2px solid #ff0000; padding-left: 15px; margin: 15px 0; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PELLARHODON</h1>
    </div>

    <div class="terminal">
        <div class="line">
            <span class="label">[ACTIVITY_MONITOR]:</span>
            <span id="discord-activity" class="value">SCANNING...</span>
        </div>

        <div id="spotify-box">
            <div class="line">
                <span class="label">STREAM_ID:</span>
                <span id="track-name" class="value">IDLE</span>
            </div>
            <div class="line">
                <span class="label">SOURCE_STATION:</span>
                <span id="track-artist" class="value">OFFLINE</span>
            </div>
        </div>

        <div class="line">
            <span class="label">[SYSTEM_LOG]:</span>
            <span>LVL_373 // STEAM_VAL: <span class="value">1927€</span> // UPTIME: <span id="uptime" class="value">00:00:00</span> <span class="blink">_</span></span>
        </div>
    </div>

    <script>
        // TVÉ DISCORD ID (Tady ho musíš mít pro Lanyard)
        const DISCORD_ID = "215886367803604992"; // Zkontroluj si své ID v Discordu!

        async function getLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await res.json();

                // 1. SPOTIFY LOGIC
                const track = document.getElementById('track-name');
                const artist = document.getElementById('track-artist');
                
                if (data.listening_to_spotify && data.spotify) {
                    track.innerText = data.spotify.song.toUpperCase();
                    artist.innerText = data.spotify.artist.toUpperCase();
                } else {
                    track.innerText = "NO_AUDIO_DETECTED";
                    artist.innerText = "STATION_SLEEPING";
                }

                // 2. ACTIVITY LOGIC (Hry jako R6)
                const activity = document.getElementById('discord-activity');
                const r6 = data.activities.find(a => a.name === "Tom Clancy's Rainbow Six Siege" || a.type === 0);
                
                if (r6) {
                    activity.innerText = `${r6.name.toUpperCase()} // ${r6.details || 'IN_GAME'}`;
                } else {
                    activity.innerText = "NO_ACTIVE_PROCESS";
                }

            } catch (e) {
                console.error("Lanyard error");
            }
        }

        // UPTIME
        const start = new Date(2025, 0, 1).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').innerText = `${d}D:${h}H:${m}M:${s}S`;
        }, 1000);

        setInterval(getLanyard, 5000); // Kontrola každých 5s
        getLanyard();
    </script>
</body>
</html>
