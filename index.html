<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon // Terminal</title>
    <style>
        body { background-color: #000; color: #cc0000; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .header h1 { font-size: 60px; letter-spacing: 15px; color: #330000; text-shadow: 0 0 10px rgba(255,0,0,0.1); margin-bottom: 50px; }
        .terminal { border-top: 1px solid #220000; padding-top: 20px; width: 80%; max-width: 800px; }
        .line { font-size: 12px; text-transform: uppercase; margin: 8px 0; letter-spacing: 2px; text-align: center; }
        .label { color: #550000; }
        .value { color: #ff0000; font-weight: bold; }
        .cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header"><h1>PELLARHODON</h1></div>
    <div class="terminal">
        <div class="line">
            <span class="label">[R6_CORE]:</span> 
            LVL <span id="r6-lvl">373</span> // 
            RANK: <span id="r6-rank">COPPER V</span> // 
            MMR: <span id="r6-mmr">1157</span>
        </div>
        <div class="line">
            <span class="label">[R6_STATS]:</span> 
            KILLS: <span id="r6-kills">32145</span> // 
            ACES: <span id="r6-aces">158</span> // 
            TIME: <span id="r6-time">2140H</span>
        </div>
        <div class="line">
            <span class="label">[SYSTEM]:</span> 
            OP: <span id="r6-op">IANA / AZAMI</span> <span class="cursor">_</span>
        </div>
    </div>
</body>
</html>
