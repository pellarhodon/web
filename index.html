<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; font-family: 'Inter', sans-serif;
        }

        .header { margin-top: 12vh; text-align: center; z-index: 10; }
        h1 {
            color: #550000; font-size: clamp(40px, 10vw, 90px); font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.3em; margin: 0;
            animation: pulse 8s ease-in-out infinite; user-select: none;
        }

        @keyframes pulse { 0%, 100% { color: #330000; } 50% { color: #880000; } }

        .footer {
            position: absolute; bottom: 25px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }

        .stat-item {
            opacity: 0.4; filter: grayscale(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-item:hover { opacity: 1; filter: grayscale(0%); transform: translateY(-2px); }

        .stats-card, .wigle-img { border-radius: 8px; border: 1px solid #1a0000; background: #111; }

        .system-container { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 10px; }
        .system-log {
            color: #cc0000; font-family: monospace; font-size: 10px;
            letter-spacing: 1.5px; text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.2); font-weight: bold;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
        }

        .system-log a { color: #cc0000; text-decoration: none; transition: 0.3s; }
        .system-log a:hover { color: #ff0000; text-shadow: 0 0 8px #ff0000; }
        .system-log .value { color: #ff0000; }
        .separator { opacity: 0.3; }

        @media (max-width: 768px) {
            .system-log { font-size: 8px; gap: 5px; flex-direction: column; text-align: center; }
            .separator { display: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pellarhodon</h1>
    </div>

    <div class="footer">
        
        <div class="stat-item">
            <a href="https://stats.fm/31t4msdnvfenngbqcadme5oygj3q" target="_blank">
                <img src="https://statsfm-cards.vercel.app/api/now-playing?id=31t4msdnvfenngbqcadme5oygj3q&theme=dark" class="stats-card" height="75" alt="Spotify">
            </a>
        </div>

        <div class="stat-item">
            <a href="https://wigle.net" target="_blank">
                <img src="https://wigle.net/bi/GlBn9ccbiSGDMDb1tTQ_jg.png" class="wigle-img" height="30">
            </a>
        </div>

        <div class="system-container">
            <div class="system-log" id="r6-log-main">
                R6_CORE: <span class="value">LOADING...</span>
            </div>
            <div class="system-log" id="r6-log-stats">
                R6_STATS: <span class="value">INITIALIZING...</span>
            </div>

            <div class="system-log">
                <a href="https://steamdb.info/calculator/76561198009042620/?cc=eu" target="_blank">
                    STEAM_VAL: <span class="value">1927€</span> <span class="separator">//</span> GAMES: <span class="value">269</span> <span class="separator">//</span> PLAYTIME: <span class="value">7,240H</span>
                </a>
                <span class="separator">//</span>
                <div id="uptime-log">UPTIME: SYNC...</div>
            </div>
        </div>

    </div>

   <script>
    async function fetchR6Stats() {
        const r6Main = document.getElementById('r6-log-main');
        const r6Stats = document.getElementById('r6-log-stats');
        
        // Používáme stabilnější proxy a přímé vyhledávání
        const proxy = "https://corsproxy.io/?";
        const target = "https://r6.apitab.com/search/uplay/Pellarhodon";

        try {
            const response = await fetch(proxy + encodeURIComponent(target));
            const data = await response.json();
            
            // Kontrola, jestli API vrátilo hráče (zkusíme najít nejpřesnější shodu)
            if (data && data.players) {
                const playerIds = Object.keys(data.players);
                // Najdeme hráče, který má v názvu "Pellarhodon" (case-insensitive)
                const id = playerIds.find(pid => 
                    data.players[pid].name.toLowerCase() === "pellarhodon".toLowerCase()
                ) || playerIds[0];

                const player = data.players[id];
                
                // DATA EXTRAKCE
                const lvl = player.stats.level || "0";
                const rank = (player.metadata.rankname || "UNRANKED").toUpperCase();
                const mmr = player.stats.score || "0";
                
                // Formátování statistik (děleno 100 u surových dat z R6Tab)
                const kd = (player.stats.kd / 100).toFixed(2);
                const wl = (player.stats.wl / 100).toFixed(1);
                const kills = player.stats.kills || "0";

                r6Main.innerHTML = `
                    R6_CORE: <span class="value">LVL ${lvl}</span>
                    <span class="separator">//</span>
                    RANK: <span class="value">${rank}</span>
                    <span class="separator">//</span>
                    MMR: <span class="value">${mmr}</span>
                `;

                r6Stats.innerHTML = `
                    R6_STATS: <span class="value">K/D ${kd}</span>
                    <span class="separator">//</span>
                    W/L: <span class="value">${wl}%</span>
                    <span class="separator">//</span>
                    TOTAL_KILLS: <span class="value">${kills}</span>
                `;
            } else {
                // Pokud API nic nenajde, zkusíme fallback na statický výpis tvých známých dat
                r6Main.innerHTML = `R6_CORE: <span class="value">LVL 373</span> <span class="separator">//</span> RANK: <span class="value">SYNC_ERR</span>`;
                r6Stats.innerHTML = `R6_STATS: <span class="value">MANUAL_OVERRIDE_ACTIVE</span>`;
            }
        } catch (error) {
            r6Main.innerHTML = `R6_DATA: <span class="value">API_TIMEOUT</span>`;
            r6Stats.innerHTML = `R6_STATS: <span class="value">RETRYING_CONNECTION...</span>`;
            // Zkusíme to znovu za 10 sekund
            setTimeout(fetchR6Stats, 10000);
        }
    }

    // UPTIME
    const start = new Date(2025, 0, 1, 12, 0, 0).getTime();
    function updateUptime() {
        const now = new Date().getTime();
        const diff = now - start;
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        const log = document.getElementById('uptime-log');
        if(log) { log.innerText = `UPTIME: ${d}D_${h}H_${m}M_${s}S // STATUS: ONLINE`; }
    }

    setInterval(updateUptime, 1000);
    updateUptime();
    fetchR6Stats();
</script>
</body>
</html>
