<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #cc0000;
            display: flex; flex-direction: column; align-items: center;
            font-family: monospace; overflow: hidden;
        }

        .header { margin-top: 15vh; text-align: center; }
        h1 {
            font-size: clamp(40px, 10vw, 80px); letter-spacing: 0.3em;
            text-transform: uppercase; margin: 0; color: #440000;
            animation: pulse 5s infinite;
        }
        @keyframes pulse { 50% { color: #990000; } }

        .footer {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        /* CUSTOM SYSTÉMOVÉ KARTY (Místo rozbitých obrázků) */
        .sys-card {
            width: 320px; padding: 12px;
            border: 1px solid #330000; background: #050505;
            border-radius: 4px; text-decoration: none;
            display: flex; align-items: center; gap: 15px;
            transition: 0.3s; opacity: 0.6;
        }
        .sys-card:hover { opacity: 1; border-color: #ff0000; transform: translateY(-2px); }

        .sys-card img { width: 40px; height: 40px; border-radius: 4px; border: 1px solid #440000; }
        .sys-info { display: flex; flex-direction: column; }
        .sys-label { font-size: 10px; color: #660000; margin-bottom: 2px; }
        .sys-value { font-size: 13px; color: #ff0000; font-weight: bold; }

        .system-log { font-size: 10px; letter-spacing: 1px; opacity: 0.5; margin-top: 10px; }
        .value { color: #ff0000; }

        @media (max-width: 600px) { .sys-card { width: 80%; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pellarhodon</h1>
    </div>

    <div class="footer">
        
        <a href="https://r6.tracker.network/profile/pc/Pellarhodon" target="_blank" class="sys-card">
            <img src="https://trackercdn.com/cdn/r6.tracker.network/operators/badges/ash.png" alt="R6">
            <div class="sys-info">
                <span class="sys-label">DATABASE_ACCESS: R6_SIEGE</span>
                <span class="sys-value">LEVEL 373 // RANK: GOLD</span>
            </div>
        </a>

        <a href="https://stats.fm/31t4msdnvfenngbqcadme5oygj3q" target="_blank" class="sys-card">
            <img src="https://pub-static.freetls.fastly.net/statsfm/images/logo.png" alt="Spotify">
            <div class="sys-info">
                <span class="sys-label">STREAM_FEED: STATS.FM_PRO</span>
                <span class="sys-value">LIVE_PLAYBACK_ACTIVE</span>
            </div>
        </a>

        <a href="https://wigle.net" target="_blank" style="opacity:0.4; filter:grayscale(1);">
            <img src="https://wigle.net/bi/GlBn9ccbiSGDMDb1tTQ_jg.png" height="30" alt="WiGLE">
        </a>

        <div class="system-log">
            STEAM_VAL: <span class="value">1927€</span> // UPTIME: <span id="uptime">SYNC...</span>
        </div>

    </div>

    <script>
        const start = new Date(2025, 0, 1, 12, 0, 0).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').innerText = `${d}D_${h}H_${m}M_${s}S`;
        }, 1000);
    </script>
</body>
</html>
