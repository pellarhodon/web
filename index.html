<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>
    
    <link rel="icon" type="image/png" href="/favicon.png?v=3">
    <link rel="apple-touch-icon" href="/favicon.png">

    <style>
        /* ZÁKLADNÍ STYL */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center; 
            overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* JMÉNO POSUNUTÉ VÝŠ */
        .name-container {
            text-align: center;
            user-select: none;
            z-index: 1;
            margin-top: 15vh; 
        }

        h1 {
            color: #2a0000; 
            font-size: clamp(32px, 10vw, 90px); 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.02);
            animation: pulse 10s ease-in-out infinite;
            transition: color 0.8s ease;
        }

        h1:hover {
            color: #770000;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }

        /* UPTIME COUNTER STYL */
        #uptime-log {
            color: #1a0000;
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 2px;
            margin-top: 20px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        @keyframes pulse {
            0%, 100% { color: #220000; filter: blur(1px); }
            50% { color: #3a0000; filter: blur(0px); }
        }

        /* SPODNÍ PANEL STATISTIK */
        .bottom-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 2;
            width: 100%;
        }

        .stat-item {
            opacity: 0.2;
            filter: grayscale(100%) brightness(70%);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-item:hover {
            opacity: 1;
            filter: grayscale(0%) brightness(100%);
            transform: translateY(-3px);
        }

        .r6-widget {
            width: 420px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .wigle-stats img {
            max-width: 180px;
            height: auto;
            border: none;
        }

        @media (max-width: 768px) {
            .name-container { margin-top: 20vh; }
            .r6-widget { width: 90vw; height: 80px; }
            #uptime-log { font-size: 9px; letter-spacing: 1px; }
        }
    </style>
</head>

    <script>
        // Nastavení data spuštění (formát: Rok, Měsíc-1, Den, Hodina, Minuta)
        // 2026, 2, 17 znamená 17. března 2026 (leden je 0)
        const startDate = new Date(2026, 2, 17, 12, 0, 0);

        function updateUptime() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('uptime-log').innerText = 
                `UPTIME: ${days}D_${hours}H_${minutes}M_${seconds}S // STATUS: OPERATIONAL`;
        }

        setInterval(updateUptime, 1000);
        updateUptime();
    </script>
