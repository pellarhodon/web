<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000000;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; font-family: 'Inter', sans-serif;
        }

        .header {
            margin-top: 15vh;
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #550000;
            font-size: clamp(40px, 10vw, 90px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin: 0;
            animation: pulse 8s ease-in-out infinite;
            user-select: none;
        }

        @keyframes pulse {
            0%, 100% { color: #330000; }
            50% { color: #880000; }
        }

        .footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .stat-item {
            opacity: 0.4;
            filter: grayscale(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-item:hover {
            opacity: 1;
            filter: grayscale(0%);
            transform: translateY(-2px);
        }

        .stats-card, .wigle-img {
            border-radius: 8px;
            border: 1px solid #1a0000;
            background: #111;
        }

        /* JEDNOTNÝ SYSTÉMOVÝ LOG */
        .system-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .system-log {
            color: #cc0000;
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
            font-weight: bold;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .system-log a { color: #cc0000; text-decoration: none; transition: 0.3s; }
        .system-log a:hover { color: #ff0000; text-shadow: 0 0 8px #ff0000; }
        .system-log .value { color: #ff0000; }
        .separator { opacity: 0.5; }

        @media (max-width: 768px) {
            .system-log { font-size: 9px; gap: 8px; flex-direction: column; text-align: center; }
            .separator { display: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Pellarhodon</h1>
    </div>

    <div class="footer">
        
        <div class="stat-item">
            <a href="https://stats.fm/31t4msdnvfenngbqcadme5oygj3q" target="_blank">
                <img src="https://statsfm-cards.vercel.app/api/now-playing?id=31t4msdnvfenngbqcadme5oygj3q&theme=dark" class="stats-card" height="80" alt="Spotify Now Playing">
            </a>
        </div>

        <div class="stat-item">
            <a href="https://wigle.net" target="_blank">
                <img src="https://wigle.net/bi/GlBn9ccbiSGDMDb1tTQ_jg.png" class="wigle-img" height="35">
            </a>
        </div>

        <div class="system-container">
            <div class="system-log">
                <span>R6_DATA: <span class="value">LVL 373</span></span>
                <span class="separator">//</span>
                <span>RANK: <span class="value">GOLD II</span></span>
                <span class="separator">//</span>
                <span>OPERATOR: <span class="value">PELLARHODON</span></span>
            </div>

            <div class="system-log">
                <a href="https://steamdb.info/calculator/76561198009042620/?cc=eu" target="_blank">
                    STEAM_VAL: <span class="value">1927€</span> <span class="separator">//</span> GAMES: <span class="value">269</span> <span class="separator">//</span> PLAYTIME: <span class="value">7,240H</span>
                </a>
                <span class="separator">//</span>
                <div id="uptime-log">UPTIME: SYNC...</div>
            </div>
        </div>

    </div>

    <script>
        const start = new Date(2025, 0, 1, 12, 0, 0).getTime();
        function update() {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const log = document.getElementById('uptime-log');
            if(log) {
                log.innerText = `UPTIME: ${d}D_${h}H_${m}M_${s}S // STATUS: ONLINE`;
            }
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
