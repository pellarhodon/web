<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #cc0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
        }

        /* POMALÝ A NENÁPADNÝ NADPIS */
        .header { margin-top: 10vh; text-align: center; }
        h1 {
            font-size: clamp(30px, 8vw, 75px); 
            letter-spacing: 15px; 
            color: #1a0000; /* Základní velmi tmavá barva */
            text-transform: uppercase;
            /* Prodlouženo na 8 sekund pro maximální plynulost */
            animation: slowPulse 8s ease-in-out infinite;
            margin: 0;
            user-select: none;
        }

        @keyframes slowPulse {
            0%, 100% { 
                color: #1a0000; 
                text-shadow: 0 0 5px rgba(0,0,0,0); 
            }
            50% { 
                color: #660000; /* Jen jemné rozsvícení, ne úplně rudá */
                text-shadow: 0 0 15px rgba(255, 0, 0, 0.15); 
            }
        }

        /* ZBYTEK LAYOUTU */
        .footer {
            margin-bottom: 5vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .interactive-node {
            opacity: 0.3; /* Ještě o něco bledší v základu */
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .interactive-node:hover {
            opacity: 1;
            transform: scale(1.01);
        }

        .r6-banner {
            width: 500px; height: 70px; border: none;
            filter: grayscale(0.8) brightness(0.6);
            transition: filter 0.6s;
        }
        .r6-banner:hover { filter: grayscale(0) brightness(1); }

        .terminal-info { text-align: center; }
        .line { font-size: 11px; text-transform: uppercase; margin: 5px 0; letter-spacing: 2px; }
        .label { color: #440000; }
        .value { color: #880000; font-weight: bold; }
        
        #spotify-box { 
            margin: 10px 0; 
            border-left: 2px solid #1a0000; 
            padding-left: 15px; 
            text-align: left;
            transition: border-color 0.6s;
        }
        #spotify-box:hover { border-left-color: #cc0000; }

        .cursor { animation: blink 1.2s step-end infinite; color: #550000; }
        @keyframes blink { 50% { opacity: 0; } }

        .wigle-frame img { 
            border: 0; 
            max-width: 180px;
            filter: grayscale(1) brightness(0.3);
            transition: filter 0.8s;
        }
        .wigle-frame:hover img { filter: grayscale(0) brightness(0.8); }

        a { text-decoration: none; color: inherit; }
    </style>
</head>

    <script>
        const DISCORD_ID = "583764327459192872";
        const START_DATE = new Date(2025, 0, 1).getTime();

        async function fetchLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await res.json();
                if (data.listening_to_spotify && data.spotify) {
                    document.getElementById('track-name').innerText = data.spotify.song.toUpperCase();
                    document.getElementById('track-artist').innerText = data.spotify.artist.toUpperCase();
                } else {
                    document.getElementById('track-name').innerText = "STATION_IDLE";
                    document.getElementById('track-artist').innerText = "NO_AUDIO_FEED";
                }
            } catch (e) { console.log("Lanyard down"); }
        }

        function updateUptime() {
            const now = new Date().getTime();
            const diff = now - START_DATE;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').innerText = `${d}D_${h}H_${m}M_${s}S`;
        }

        setInterval(fetchLanyard, 5000);
        setInterval(updateUptime, 1000);
        fetchLanyard(); updateUptime();
    </script>
