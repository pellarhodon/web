<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #cc0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* HEADER */
        .header { margin-top: 6vh; text-align: center; }
        h1 {
            font-size: clamp(40px, 12vw, 110px);
            letter-spacing: 25px; 
            color: #1a0000;
            text-transform: uppercase;
            animation: slowPulse 8s ease-in-out infinite;
            margin: 0;
            user-select: none;
        }

        @keyframes slowPulse {
            0%, 100% { color: #1a0000; text-shadow: 0 0 5px rgba(0,0,0,0); }
            50% { color: #880000; text-shadow: 0 0 25px rgba(255, 0, 0, 0.2); }
        }

        .footer {
            margin-bottom: 5vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        .interactive-node {
            opacity: 0.4;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .interactive-node:hover {
            opacity: 1;
            transform: scale(1.02);
        }

        /* R6 BANNER - DARK RED DESIGN */
        .r6-overlay-root {
            width: 500px; height: 75px;
            background: linear-gradient(135deg, rgba(15,0,0,0.98) 0%, rgba(30,0,0,0.95) 100%);
            border-top: 2px solid #cc0000;
            border-bottom: 1px solid #220000;
            border-radius: 2px; color: #ffffff;
            font-family: 'Inter', sans-serif;
            position: relative; display: flex;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        .stat-group { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; }
        .stat-label { font-size: 10px; color: #660000; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .stat-val { font-size: 15px; font-weight: 800; color: #eee; }
        .stat-val.primary { color: #cc0000; }

        .rank-glow {
            position: absolute; width: 140%; height: 140%; 
            background: radial-gradient(circle, rgba(204,0,0,0.15) 0%, transparent 65%);
            z-index: 1;
        }

        /* TERMINAL STATS */
        .terminal-info { text-align: center; }
        .line { font-size: 16px; text-transform: uppercase; margin: 10px 0; letter-spacing: 2px; }
        .label { color: #550000; }
        .value { color: #cc0000; font-weight: bold; }
        .separator { color: #330000; margin: 0 12px; }
        
        #spotify-box { margin: 15px 0; border-left: 4px solid #220000; padding-left: 25px; text-align: left; transition: border-color 0.6s; }
        #spotify-box:hover { border-left-color: #cc0000; }
        .cursor { animation: blink 1.2s step-end infinite; color: #770000; }
        @keyframes blink { 50% { opacity: 0; } }

        .wigle-frame img { border: 0; max-width: 220px; filter: grayscale(1) brightness(0.3); transition: filter 0.8s; }
        .wigle-frame:hover img { filter: grayscale(0) brightness(0.9); }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PELLARHODON</h1>
    </div>

    <div class="footer">
        <div class="interactive-node">
            <div class="r6-overlay-root">
                <div style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 40px; padding-left: 10px;">
                    <div class="stat-group"><div class="stat-label">Season RP</div><div class="stat-val primary">1 200</div></div>
                    <div class="stat-group"><div class="stat-label">LVL</div><div class="stat-val">377</div></div>
                </div>
                
                <div style="position: relative; width: 80px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; z-index: 2;">
                    <div class="rank-glow"></div>
                    <img src="https://r6data.eu/assets/img/r6_ranks_img/copper-3.webp" alt="Rank" style="height: 48px; width: auto; z-index: 3; filter: drop-shadow(0 0 8px rgba(204,0,0,0.4));">
                </div>
                
                <div style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 40px; padding-right: 10px;">
                    <div class="stat-group"><div class="stat-label">K/D</div><div class="stat-val">0.76</div></div>
                    <div class="stat-group"><div class="stat-label">W/L</div><div class="stat-val">3-3</div></div>
                </div>
            </div>
        </div>

        <div class="terminal-info interactive-node">
            <div id="spotify-box">
                <div class="line"><span class="label">AUDIO_STREAM:</span> <span id="track-name" class="value">SIGNAL_LOST</span></div>
                <div class="line"><span class="label">STATION_SRC:</span> <span id="track-artist" class="value">OFFLINE</span></div>
            </div>

            <div class="line">
                <span class="label">[BINARY_TIME]:</span> <span id="binary-clock" class="value">000000000000000000</span>
            </div>

            <div class="line">
                <span class="label">[SYSTEM_DB]:</span> STEAM_VAL: <span class="value">1927€</span> <span class="separator">//</span> HITS: <span id="visits" class="value">...</span>
            </div>

            <div class="line">
                <span class="label">[VERSION_CTRL]:</span> LAST_PUSH: <span id="git-date" class="value">SYNCING...</span> <span class="separator">//</span> <span id="git-msg" class="value">...</span>
            </div>

            <div class="line">
                <span class="label">[STATUS]:</span> UPTIME: <span id="uptime" class="value">0D_0H_0M_0S</span><span class="cursor">_</span>
            </div>
        </div>

        <a href="https://wigle.net" class="wigle-frame interactive-node" target="_blank">
            <img src="https://wigle.net/bi/GlBn9ccbiSGDMDb1tTQ_jg.png" alt="WiGLE Stats">
        </a>
    </div>

    <script>
        // CONFIG
        const GITHUB_USER = "pellarhodon";
        const REPO = "pellarhodon.github.io";
        const DISCORD_ID = "583764327459192872";
        const START_DATE = new Date(2026, 0, 21).getTime();

        // BINARY CLOCK (18-bit stream)
        function updateBinaryClock() {
            const now = new Date();
            const h = now.getHours().toString(2).padStart(6, '0');
            const m = now.getMinutes().toString(2).padStart(6, '0');
            const s = now.getSeconds().toString(2).padStart(6, '0');
            document.getElementById('binary-clock').innerText = h + m + s;
        }

        // GITHUB FETCH
        async function fetchGit() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO}/commits`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                const lastCommit = data[0];
                const date = new Date(lastCommit.commit.author.date);
                const formattedDate = date.getDate() + "." + (date.getMonth() + 1) + "." + date.getFullYear();
                document.getElementById('git-date').innerText = formattedDate;
                document.getElementById('git-msg').innerText = lastCommit.commit.message.toUpperCase().substring(0, 15) + "...";
            } catch (e) { 
                document.getElementById('git-date').innerText = "OFFLINE/404"; 
            }
        }

        // VISIT COUNTER
        async function updateVisits() {
            try {
                const res = await fetch(`https://api.counterapi.dev/v1/pellarhodon/visits/up`);
                const data = await res.json();
                document.getElementById('visits').innerText = data.count.toLocaleString();
            } catch (e) { 
                document.getElementById('visits').innerText = "ERR"; 
            }
        }

        // LANYARD (SPOTIFY)
        async function fetchLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await res.json();
                if (data.listening_to_spotify && data.spotify) {
                    document.getElementById('track-name').innerText = data.spotify.song.toUpperCase();
                    document.getElementById('track-artist').innerText = data.spotify.artist.toUpperCase();
                } else {
                    document.getElementById('track-name').innerText = "STATION_IDLE";
                    document.getElementById('track-artist').innerText = "NO_AUDIO_FEED";
                }
            } catch (e) { console.log("Lanyard error"); }
        }

        // UPTIME COUNTER
        function updateUptime() {
            const now = new Date().getTime();
            const diff = now - START_DATE;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').innerText = `${d}D_${h}H_${m}M_${s}S`;
        }

        // LOOPS
        setInterval(fetchLanyard, 5000);
        setInterval(updateUptime, 1000);
        setInterval(updateBinaryClock, 1000);
        
        // INITIALIZE
        fetchLanyard(); 
        updateUptime();
        updateVisits(); 
        updateBinaryClock();
        fetchGit();
    </script>
</body>
</html>
