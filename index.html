<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%232a0000%22/></svg>">
    
    <style>
        /* 1. ABSOLUTNÍ MINIMALISMUS POZADÍ */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Černočerná */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Žádné skrollování */
            cursor: default;
        }

        /* 2. DESIGN JMÉNA */
        .name-container {
            text-align: center;
            user-select: none; /* Text nelze označit myší (provokativní detail) */
        }

        h1 {
            /* Temně krvavá barva na hraně viditelnosti */
            color: #2a0000; 
            
            /* Moderní bezpatkový font */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Velikost reagující na displej (responzivní) */
            font-size: clamp(32px, 10vw, 90px); 
            
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em; /* Široké rozestupy pro dominanci */
            margin: 0;
            
            /* Jemná aura */
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.02);
            
            /* Animace "Dýchání stínu" */
            animation: pulse 10s ease-in-out infinite;
            transition: color 0.8s ease;
        }

        /* 3. INTERAKCE: Při najetí myší se barva mírně "probudí" */
        h1:hover {
            color: #550000;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
        }

        /* 4. ANIMACE PULZOVÁNÍ */
        @keyframes pulse {
            0%, 100% {
                color: #220000;
                letter-spacing: 0.3em;
                filter: blur(1px); /* Mírné rozostření pro snový efekt */
            }
            50% {
                color: #3a0000;
                letter-spacing: 0.32em;
                filter: blur(0px);
            }
        }

        /* Skrytí scrollbaru pro jistotu ve všech prohlížečích */
        body::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="name-container">
        <h1>Pellarhodon</h1>
    </div>

</body>
</html>
