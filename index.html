        body, html {

            background-color: #000000;
            display: flex; flex-direction: column; align-items: center;

        .header {
            margin-top: 15vh;
            text-align: center;
            z-index: 10;
        }

            color: #550000;
            font-size: clamp(40px, 10vw, 90px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin: 0;
            animation: pulse 8s ease-in-out infinite;
            user-select: none;

            50% { color: #880000; }
        }

        .footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .stat-item {
            opacity: 0.4;
            filter: grayscale(100%);
            transition: 0.5s;
        }

        .stat-item:hover {
            opacity: 1;
            filter: grayscale(0%);
        }

        /* Spotify specifický filtr pro tvůj styl */
        .spotify-widget img {
            max-width: 300px;
            border-radius: 8px;
            border: 1px solid #1a0000;
        }

        iframe { border-radius: 8px; border: 1px solid #1a0000; background: #111; }

        .system-log {
            color: #cc0000;
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
            font-weight: bold;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }

        .system-log a { color: #cc0000; text-decoration: none; }
        .system-log a:hover { color: #ff0000; }
        .system-log span.value { color: #ff0000; }

        @media (max-width: 768px) {
            .system-log { font-size: 9px; flex-direction: column; gap: 5px; text-align: center; }
        }
    </style>

    <script>
        const start = new Date(2025, 0, 1, 12, 0, 0).getTime();
        function update() {
            const now = new Date().getTime();
            const diff = now - start;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            const log = document.getElementById('uptime-log');
            if(log) {
                log.innerText = `UPTIME: ${d}D_${h}H_${m}M_${s}S // STATUS: ONLINE`;
            }
        }
        setInterval(update, 1000);
        update();
