<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon // Terminal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <style>
        /* IMPORT FONTS */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #cc0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* HEADER */
        .header { margin-top: 8vh; text-align: center; }
        h1 {
            font-size: clamp(30px, 8vw, 75px); 
            letter-spacing: 15px; 
            color: #1a0000;
            text-transform: uppercase;
            animation: slowPulse 8s ease-in-out infinite;
            margin: 0;
            user-select: none;
        }

        @keyframes slowPulse {
            0%, 100% { color: #1a0000; text-shadow: 0 0 5px rgba(0,0,0,0); }
            50% { color: #770000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.15); }
        }

        .footer {
            margin-bottom: 5vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .interactive-node {
            opacity: 0.35;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .interactive-node:hover {
            opacity: 1;
            transform: scale(1.01);
        }

        /* R6 OVERLAY INTEGRATION */
        .r6-container {
            width: 420px;
            height: 80px;
            border: 1px solid #1a0000;
            overflow: hidden;
            border-radius: 8px;
            background: rgba(17,17,17,0.95);
            filter: grayscale(0.8) brightness(0.6);
            transition: filter 0.6s;
        }
        .interactive-node:hover .r6-container {
            filter: grayscale(0) brightness(1);
        }

        /* TERMINAL TEXTS */
        .terminal-info { text-align: center; }
        .line { 
            font-size: 14px; 
            text-transform: uppercase; 
            margin: 12px 0; 
            letter-spacing: 2px; 
        }
        
        .label { color: #440000; }
        .value { color: #aa0000; font-weight: bold; }
        .separator { color: #220000; margin: 0 10px; }
        
        #spotify-box { 
            margin: 15px 0; 
            border-left: 3px solid #1a0000; 
            padding-left: 20px; 
            text-align: left;
            transition: border-color 0.6s;
        }
        #spotify-box:hover { border-left-color: #cc0000; }

        .cursor { animation: blink 1.2s step-end infinite; color: #550000; }
        @keyframes blink { 50% { opacity: 0; } }

        .wigle-frame img { 
            border: 0; 
            max-width: 190px;
            filter: grayscale(1) brightness(0.3);
            transition: filter 0.8s;
        }
        .wigle-frame:hover img { filter: grayscale(0) brightness(0.8); }

        a { text-decoration: none; color: inherit; }

        /* R6 INTERNAL STYLES FROM YOUR CODE */
        .r6-internal {
            width: 100%; height: 100%; display: flex; color: #fff; font-family: 'Inter', sans-serif;
        }
        .stat-group { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; }
        .stat-label { font-size: 12px; opacity: 0.6; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .stat-val { font-size: 22px; font-weight: 800; }
        .stat-val.primary { color: #e53935; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PELLARHODON</h1>
    </div>

    <div class="footer">
        
        <div class="interactive-node">
            <div class="r6-container">
                <div class="r6-internal">
                    <div style="background: linear-gradient(180deg, #e53935 0%, rgba(0,0,0,0.5) 150%); display:flex; align-items:center; justify-content:center; padding: 0 12px; border-right: 1px solid rgba(255,255,255,0.1);">
                        <img src="https://r6data.eu/assets/img/r6_ranks_img/copper-4.webp" alt="Rank" style="height: 56px; width: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">
                    </div>
                    <div style="flex:1; display:flex; align-items:center; justify-content: space-around; padding: 0 12px;">
                        <div class="stat-group"><div class="stat-label">RP</div><div class="stat-val">1 150</div></div>
                        <div class="stat-group"><div class="stat-label">K/D</div><div class="stat-val primary">0.92</div></div>
                        <div class="stat-group"><div class="stat-label">W/L</div><div class="stat-val">2-1</div></div>
                        <div class="stat-group"><div class="stat-label">LVL</div><div class="stat-val">373</div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="terminal-info interactive-node">
            <div id="spotify-box">
                <div class="line"><span class="label">AUDIO_STREAM:</span> <span id="track-name" class="value">SIGNAL_LOST</span></div>
                <div class="line"><span class="label">STATION_SRC:</span> <span id="track-artist" class="value">OFFLINE</span></div>
            </div>

            <div class="line">
                <span class="label">[STEAM_DB_CALC]:</span> 
                VAL: <span class="value">1927€</span> 
                <span class="separator">//</span> 
                GAMES: <span class="value">269</span> 
                <span class="separator">//</span> 
                PLAYED: <span class="value">222 (82%)</span>
            </div>

            <div class="line">
                <span class="label">[SYSTEM_INFO]:</span> 
                TOTAL_TIME: <span class="value">7,240H</span> 
                <span class="separator">//</span> 
                UPTIME: <span id="uptime" class="value">0D_0H_0M_0S</span>
                <span class="cursor">_</span>
            </div>
        </div>

        <a href="https://wigle.net" class="wigle-frame interactive-node" target="_blank">
            <img src="https://wigle.net/bi/GlBn9ccbiSGDMDb1tTQ_jg.png" alt="WiGLE Banner">
        </a>
    </div>

    <script>
        const DISCORD_ID = "583764327459192872";
        const START_DATE = new Date(2025, 0, 1).getTime();

        async function fetchLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await res.json();
                if (data.listening_to_spotify && data.spotify) {
                    document.getElementById('track-name').innerText = data.spotify.song.toUpperCase();
                    document.getElementById('track-artist').innerText = data.spotify.artist.toUpperCase();
                } else {
                    document.getElementById('track-name').innerText = "STATION_IDLE";
                    document.getElementById('track-artist').innerText = "NO_AUDIO_FEED";
                }
            } catch (e) { console.log("Lanyard error"); }
        }

        function updateUptime() {
            const now = new Date().getTime();
            const diff = now - START_DATE;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').innerText = `${d}D_${h}H_${m}M_${s}S`;
        }

        setInterval(fetchLanyard, 5000);
        setInterval(updateUptime, 1000);
        fetchLanyard(); updateUptime();
    </script>
</body>
</html>
