<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>

    <style>
        /* ZÁKLADNÍ STYL */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            /* Změna na column, aby jméno mohlo být nahoře */
            display: flex;
            flex-direction: column;
            align-items: center; 
            overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* JMÉNO POSUNUTÉ VÝŠ */
        .name-container {
            text-align: center;
            user-select: none;
            z-index: 1;
            /* Posun o 15 % výšky obrazovky odshora */
            margin-top: 15vh; 
        }

        h1 {
            color: #2a0000; 
            font-size: clamp(32px, 10vw, 90px); 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.02);
            animation: pulse 10s ease-in-out infinite;
            transition: color 0.8s ease;
        }

        h1:hover {
            color: #770000;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }

        @keyframes pulse {
            0%, 100% { color: #220000; filter: blur(1px); }
            50% { color: #3a0000; filter: blur(0px); }
        }

        /* SPODNÍ PANEL ZŮSTÁVÁ DOLE */
        .bottom-panel {
            position: absolute;
            bottom: 30px; /* Trochu víc místa od úplného kraje */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 2;
            width: 100%;
        }

        .stat-item {
            opacity: 0.2;
            filter: grayscale(100%) brightness(70%);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-item:hover {
            opacity: 1;
            filter: grayscale(0%) brightness(100%);
            transform: translateY(-3px);
        }

        /* R6 Widget styling */
        .r6-widget {
            width: 420px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* WiGLE Banner styling */
        .wigle-stats img {
            max-width: 180px;
            height: auto;
            border: none;
        }

        /* MOBILNÍ ÚPRAVY */
        @media (max-width: 768px) {
            .name-container {
                margin-top: 20vh; /* Na mobilu ještě trochu níž kvůli UI prohlížeče */
            }
            .r6-widget {
                width: 90vw;
                height: 80px;
            }
        }
    </style>
</head>
