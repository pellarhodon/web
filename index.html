<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon</title>
    
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/favicon.png">

    <style>
        /* 1. ZÁKLADNÍ STYL STRÁNKY */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 2. HLAVNÍ JMÉNO UPPROSTŘED */
        .name-container {
            text-align: center;
            user-select: none;
            z-index: 1;
        }

        h1 {
            color: #2a0000; 
            font-size: clamp(32px, 10vw, 90px); 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.02);
            animation: pulse 10s ease-in-out infinite;
            transition: color 0.8s ease;
        }

        h1:hover {
            color: #550000;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
        }

        @keyframes pulse {
            0%, 100% { color: #220000; filter: blur(1px); }
            50% { color: #3a0000; filter: blur(0px); }
        }

        /* 3. SPODNÍ PANEL SE STATISTIKAMI (R6 + WiGLE) */
        .bottom-stats {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Mezera mezi R6 a WiGLE */
            z-index: 2;
        }

        /* Společný styl pro utlumení statistik */
        .stat-item {
            opacity: 0.2; /* Skoro neviditelné v klidu */
            filter: grayscale(100%) brightness(70%);
            transition: all 0.6s ease;
        }

        .stat-item:hover {
            opacity: 0.9;
            filter: grayscale(0%) brightness(100%);
            transform: scale(1.02);
        }

        /* Specifické nastavení pro R6 Iframe */
        .r6-stats iframe {
            border: 1px solid #1a0000;
            border-radius: 8px;
            background: transparent;
        }

        /* WiGLE Banner */
        .wigle-stats img {
            max-width: 180px;
            height: auto;
            border: none;
        }

        /* Mobilní optimalizace */
        @media (max-width: 768px) {
            .bottom-stats {
                bottom: 15px;
                gap: 10px;
            }
            .r6-stats iframe {
                width: 260px; /* Menší na mobilu */
                height: 130px;
            }
        }
    </style>
</head>
<body>

    <div class="name-container">
        <h1>Pellarhodon</h1>
    </div>

    <div class="bottom-stats">
        
        <div class="stat-item r6-stats">
            <iframe 
                src="https://stats.cc/siege/Pellarhodon/0044ba7a-924b-450e-b4ab-f0ba9954fe86/widget?showKd=1&showHsRate=1&showWinLoss=1&showSessionDuration=1" 
                width="300" 
                height="150" 
                frameborder="0" 
                scrolling="no">
            </iframe>
        </div>

        <div class="stat-item wigle-stats">
            <a href="https://wigle.net" target="_blank" rel="noopener noreferrer">
                <img src="https://wigle.net/bi/GlBn9ccbiSGDMDb1tTQ_jg.png" alt="WiGLE Stats">
            </a>
        </div>

    </div>

</body>
</html>
