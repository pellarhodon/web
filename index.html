<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pellarhodon // Terminal</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #cc0000;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }

        .header { margin-top: 15vh; text-align: center; }
        h1 {
            font-size: clamp(30px, 8vw, 70px); letter-spacing: 0.4em;
            text-transform: uppercase; margin: 0; color: #330000;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
        }

        .terminal {
            position: absolute; bottom: 40px; width: 90%; max-width: 850px;
            border-top: 1px solid #1a0000; padding-top: 20px;
        }

        .line { font-size: 11px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .label { color: #550000; margin-right: 10px; }
        .value { color: #ff0000; font-weight: bold; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        #spotify-box { 
            border-left: 2px solid #440000; 
            padding-left: 15px; 
            margin: 20px 0;
            transition: border-color 0.5s;
        }
        .active-border { border-left-color: #ff0000 !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PELLARHODON</h1>
    </div>

    <div class="terminal">
        <div class="line">
            <span class="label">[SIGNAL_MONITOR]:</span>
            <span id="discord-activity" class="value">INITIALIZING...</span>
        </div>

        <div id="spotify-box">
            <div class="line">
                <span class="label">AUDIO_STREAM:</span>
                <span id="track-name" class="value">WAITING...</span>
            </div>
            <div class="line">
                <span class="label">STATION_SRC:</span>
                <span id="track-artist" class="value">---</span>
            </div>
        </div>

        <div class="line">
            <span class="label">[HARDWARE_LOG]:</span>
            <span>LVL_373 // STEAM_NET: <span class="value">1927€</span> // UPTIME: <span id="uptime" class="value">00:00:00</span> <span class="blink">_</span></span>
        </div>
    </div>

    <script>
        // TVÉ DISCORD ID
        const MY_ID = "583764327459192872";

        async function updateLiveStats() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${MY_ID}`);
                const { data } = await response.json();

                // 1. SPOTIFY SEKCE
                const track = document.getElementById('track-name');
                const artist = document.getElementById('track-artist');
                const box = document.getElementById('spotify-box');
                
                if (data.listening_to_spotify && data.spotify) {
                    track.innerText = data.spotify.song.toUpperCase();
                    artist.innerText = data.spotify.artist.toUpperCase();
                    box.classList.add('active-border');
                } else {
                    track.innerText = "STATION_IDLE";
                    artist.innerText = "NO_AUDIO_IN_FEED";
                    box.classList.remove('active-border');
                }

                // 2. ACTIVITY SEKCE (R6, Hry)
                const activity = document.getElementById('discord-activity');
                // Hledáme aktivitu, která není Spotify (včetně Siege)
                const game = data.activities.find(a => a.type === 0);
                
                if (game) {
                    const detail = game.details ? ` // ${game.details}` : "";
                    activity.innerText = `${game.name.toUpperCase()}${detail}`;
                } else {
                    activity.innerText = "NO_EXTERNAL_PROCESS_DETECTED";
                }

            } catch (err) {
                console.log("Lanyard Sync Error");
            }
        }

        // UPTIME LOGIC
        const startTimestamp = new Date(2025, 0, 1).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - startTimestamp;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').innerText = `${d}D:${h}H:${m}M:${s}S`;
        }, 1000);

        // Update každých 5 vteřin
        setInterval(updateLiveStats, 5000);
        updateLiveStats();
    </script>
</body>
</html>
